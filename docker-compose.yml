services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pool_play
      POSTGRES_PASSWORD: pool_play
      POSTGRES_DB: pool_play
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pool_play"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pool_play:pool_play@postgres:5432/pool_play
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      FRONTEND_URL: http://localhost:3000
      PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./front
      args:
        REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      - backend

volumes:
  postgres_data:
